name = "ksp-gives-back"
main = "src/index.js"
compatibility_date = "2024-12-01"

# ── Static Assets ──
[assets]
directory = "./public"

# ── Cloudflare D1 Database ──
[[d1_databases]]
binding = "DB"
database_name = "ksp-gives-back"
database_id = "78c96711-9328-4af9-8442-6a3fe8a94f11"

# ── Cloudflare KV Namespace ──
[[kv_namespaces]]
binding = "CACHE"
id = "cfb8f1d2232446028d80b177502a171d"

# ── Cloudflare R2 Bucket (Media Uploads) ──
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "ksp-gives-back-media"
